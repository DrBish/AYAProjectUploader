<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Student Upload Portal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      padding: 30px;
    }

    .card {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .logo {
      display: block;
      margin: 0 auto 20px auto;
      max-width: 220px;
      height: auto;
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .terms {
      margin-top: 18px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .terms input {
      width: auto;
      margin-top: 3px;
    }

    .terms label {
      font-weight: normal;
      margin: 0;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
    }

    progress {
      width: 100%;
      margin-top: 20px;
      height: 24px;
    }

    .status {
      margin-top: 15px;
      white-space: pre-line;
      font-size: 14px;
    }

    a {
      color: #0078d4;
    }
  </style>
</head>

<body>

<div class="card">

  <img
    src="./images/eflogogradient.avif"
    class="logo"
    alt="Logo"
  />

  <h2>Student Upload Portal</h2>

  <form id="uploadForm">

    <label>Project Name</label>
    <input type="text" id="projectName" required />  

    <label>Student name(s)</label>
    <input type="text" id="name" required />

    <label>Email</label>
    <input type="email(s)" id="email" required />

    <div style="display:flex; gap:15px; margin-top:15px;">
      <div style="flex:1;">
        <label style="margin-top:0;">EF Campus</label>
        <select id="campus" style="width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box; font-size:14px;">
         <option value="">— Select —</option>
          <option value="NZ-AUC">Auckland</option>
          <option value="ES-BAR">Barcelona</option>
          <option value="DE-BER">Berlin</option>
          <option value="US-BOI">Boston</option>
          <option value="GB-BOU">Bournemouth</option>
          <option value="GB-BRI">Brighton</option>
          <option value="AU-BRS">Brisbane</option>
          <option value="GB-BST">Bristol</option>
          <option value="GB-CAM">Cambridge</option>
          <option value="ZA-CAP">Cape Town</option>
          <option value="CR-COS">Costa Rica</option>
          <option value="DE-MUN">Munich</option>
          <option value="AE-DXE">Dubai</option>
          <option value="IE-DUB">Dublin</option>
          <option value="US-HNL">Honolulu</option>
          <option value="KR-SEL">Seoul</option>
          <option value="GB-LON">London</option>
          <option value="ES-MAA">Malaga</option>
          <option value="GB-MAN">Manchester</option>
          <option value="MT-MSJ">Malta</option>
          <option value="US-MIA">Miami</option>
          <option value="FR-NIC">Nice</option>
          <option value="US-NYC">New York</option>
          <option value="GB-OXF">Oxford</option>
          <option value="FR-PAR">Paris</option>
          <option value="AU-PER">Perth</option>
          <option value="IT-ROM">Rome</option>
          <option value="US-SBA">Santa Barbara</option>
          <option value="SG-SIN">Singapore (English)</option>
          <option value="SG-SIM">Singapore (Mandarin)</option>
          <option value="AU-SYD">Sydney</option>
          <option value="CA-TOO">Toronto</option>
          <option value="CA-VAN">Vancouver</option> 
        </select>
      </div>
      <div style="flex:1;">
        <label style="margin-top:0;">Programme Start</label>
        <select id="programmeStart" style="width:100%; padding:10px; margin-top:5px; border-radius:6px; border:1px solid #ccc; box-sizing:border-box; font-size:14px;">
          <option value="">— Select —</option>
          <option value="YE1125">November 2025</option> 
          <option value="YE0126">January 2026</option>
          <option value="YE0426">April 2026</option> 
          <option value="YE0426">June 2026</option> 
          <option value="YE0926">September 2026</option>
        </select>
      </div>
    </div>

    <label>Upload File</label>
    <input type="file" id="file" required />

    <div class="terms">
      <input type="checkbox" id="consent" />
      <label for="consent">
        I have read and accept the
        <a href="./release_agreement.html" target="_blank">
          Terms & Conditions
        </a>
      </label>
    </div>

    <button id="submitBtn" disabled>
      Upload Submission
    </button>

    <progress
      id="progressBar"
      value="0"
      max="100"
      style="display:none;"
    ></progress>

    <div class="status" id="status"></div>

  </form>
</div>

<script>

const consent = document.getElementById("consent");
const submitBtn = document.getElementById("submitBtn");
const progressBar = document.getElementById("progressBar");
const status = document.getElementById("status");

consent.addEventListener("change", () => {
  submitBtn.disabled = !consent.checked;
});

function generateSubmissionId() {
  return "SUB-" + Date.now().toString(36).toUpperCase();
}

document
  .getElementById("uploadForm")
  .addEventListener("submit", async (e) => {

  e.preventDefault();

  const file = document.getElementById("file").files[0];
  if (!file) {
    status.innerText = "Please select a file.";
    return;
  }

  const submissionId = generateSubmissionId();
  submitBtn.disabled = true;
  status.innerText = "Preparing upload...";
  progressBar.style.display = "block";
  progressBar.value = 0;

  try {

    // STEP 1 — Create transfer, get parts + uploadId
    const setupRes = await fetch("/.netlify/functions/create-upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        submissionId,
        name:   document.getElementById("name").value,
        email:  document.getElementById("email").value,
        campus: document.getElementById("campus").value,
          programmeStart: document.getElementById("programmeStart").value,
        fileName: file.name,
        fileSize:  file.size
      })
    });

    const setupData = await setupRes.json();
    if (!setupRes.ok) throw new Error(setupData.error || "Upload setup failed");

    const { transferId, link, fileId, uploadId, parts } = setupData;
    const encodedUploadId = encodeURIComponent(uploadId);

    // STEP 2 — Upload each part directly to S3
    // We track overall byte progress across all parts
    let bytesUploaded = 0;
    const totalBytes = file.size;

    for (let i = 0; i < parts.length; i++) {
      const part = parts[i];
      status.innerText = `Uploading part ${i + 1} of ${parts.length}...`;

      // Get the presigned URL for this part from our proxy function
      const urlRes = await fetch(
        `/.netlify/functions/get-part-url?transferId=${transferId}&fileId=${fileId}&partNumber=${part.partNumber}&uploadId=${encodedUploadId}`
      );
      const urlData = await urlRes.json();
      if (!urlRes.ok) throw new Error(urlData.error || `Failed to get URL for part ${part.partNumber}`);

      // Upload the chunk using XHR so we get progress events
      const chunk = file.slice(part.start, part.start + part.size);
      const partBytesAtStart = bytesUploaded;

      await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("PUT", urlData.uploadUrl);

        xhr.upload.addEventListener("progress", (ev) => {
          if (ev.lengthComputable) {
            const totalUploaded = partBytesAtStart + ev.loaded;
            const percent = Math.round((totalUploaded / totalBytes) * 100);
            progressBar.value = percent;
            status.innerText = `Uploading part ${i + 1} of ${parts.length}... ${percent}%`;
          }
        });

        xhr.onload = () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            bytesUploaded += part.size;
            resolve();
          } else {
            reject(new Error(`Part ${part.partNumber} upload failed (HTTP ${xhr.status})`));
          }
        };

        xhr.onerror = () => reject(new Error(`Network error on part ${part.partNumber}`));
        xhr.send(chunk);
      });
    }

    // STEP 3 — Tell TransferNow all parts are done
    status.innerText = "Finalising upload...";
    const finalRes = await fetch("/.netlify/functions/finalize-upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ transferId, fileId, uploadId })
    });

    const finalData = await finalRes.json();
    if (!finalRes.ok) throw new Error(finalData.error || "Finalise failed");

    progressBar.value = 100;
    status.innerText =
      "Upload complete ✔\n\n" +
      "Submission ID: " + submissionId + "\n" +
      "Download link: " + link;

  } catch (err) {
    console.error(err);
    status.innerText = "Error: " + err.message;
    submitBtn.disabled = false;
  }

});

</script>

</body>
</html>
