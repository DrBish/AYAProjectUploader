<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Student Upload Portal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      padding: 30px;
    }

    .card {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .logo {
      display: block;
      margin: 0 auto 20px auto;
      max-width: 220px;
      height: auto;
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 14px;
    }

    .terms {
      margin-top: 18px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .terms input {
      width: auto;
      margin-top: 3px;
    }

    .terms label {
      font-weight: normal;
      margin: 0;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
    }

    progress {
      width: 100%;
      margin-top: 20px;
      height: 24px;
    }

    .status {
      margin-top: 15px;
      white-space: pre-line;
      font-size: 14px;
    }

    a {
      color: #0078d4;
    }
  </style>
</head>

<body>

<div class="card">

  <img src="./images/eflogogradient.avif" class="logo" alt="Logo"/>

  <h2>Student Upload Portal</h2>

  <!-- 🔵 Hidden Netlify Form -->
  <form name="submission" method="POST" data-netlify="true" hidden>
    <input type="hidden" name="form-name" value="submission" />
    <input type="text" name="submissionId" />
    <input type="text" name="projectName" />
    <input type="text" name="name" />
    <input type="text" name="email" />
    <input type="text" name="campus" />
    <input type="text" name="programmeStart" />
    <input type="text" name="transferLink" />
  </form>

  <form id="uploadForm">

    <label>Project Name</label>
    <input type="text" id="projectName" required />

    <label>Student name(s)</label>
    <input type="text" id="name" required />

    <label>Email</label>
    <input type="email" id="email" required />

    <div style="display:flex; gap:15px; margin-top:15px;">
      <div style="flex:1;">
        <label style="margin-top:0;">EF Campus</label>
        <select id="campus">
          <option value="">— Select —</option>
          <option value="NZ-AUC">Auckland</option>
          <option value="ES-BAR">Barcelona</option>
          <option value="DE-BER">Berlin</option>
          <option value="US-BOI">Boston</option>
          <option value="GB-BOU">Bournemouth</option>
          <option value="GB-BRI">Brighton</option>
          <option value="AU-BRS">Brisbane</option>
          <option value="GB-BST">Bristol</option>
          <option value="GB-CAM">Cambridge</option>
          <option value="ZA-CAP">Cape Town</option>
          <option value="CR-COS">Costa Rica</option>
          <option value="DE-MUN">Munich</option>
          <option value="AE-DXE">Dubai</option>
          <option value="IE-DUB">Dublin</option>
          <option value="US-HNL">Honolulu</option>
          <option value="KR-SEL">Seoul</option>
          <option value="GB-LON">London</option>
          <option value="ES-MAA">Malaga</option>
          <option value="GB-MAN">Manchester</option>
          <option value="MT-MSJ">Malta</option>
          <option value="US-MIA">Miami</option>
          <option value="FR-NIC">Nice</option>
          <option value="US-NYC">New York</option>
          <option value="GB-OXF">Oxford</option>
          <option value="FR-PAR">Paris</option>
          <option value="AU-PER">Perth</option>
          <option value="IT-ROM">Rome</option>
          <option value="US-SBA">Santa Barbara</option>
          <option value="SG-SIN">Singapore (English)</option>
          <option value="SG-SIM">Singapore (Mandarin)</option>
          <option value="AU-SYD">Sydney</option>
          <option value="CA-TOO">Toronto</option>
          <option value="CA-VAN">Vancouver</option> 
        </select>
      </div>

      <div style="flex:1;">
        <label style="margin-top:0;">Programme Start</label>
        <select id="programmeStart">
          <option value="">— Select —</option>
          <option value="YE1125">November 2025</option>
          <option value="YE0126">January 2026</option>
          <option value="YE0426">April 2026</option>
          <option value="YE0626">June 2026</option>
          <option value="YE0926">September 2026</option>
        </select>
      </div>
    </div>

    <label>Upload File</label>
    <input type="file" id="file" required />

    <div class="terms">
      <input type="checkbox" id="consent" />
      <label for="consent">
        I accept the
        <a href="./release_agreement.html" target="_blank">Terms & Conditions</a>
      </label>
    </div>

    <button id="submitBtn" disabled>Upload Submission</button>

    <progress id="progressBar" value="0" max="100" style="display:none;"></progress>

    <div class="status" id="status"></div>

  </form>
</div>

<script>

const consent = document.getElementById("consent");
const submitBtn = document.getElementById("submitBtn");
const progressBar = document.getElementById("progressBar");
const status = document.getElementById("status");

consent.addEventListener("change", () => {
  submitBtn.disabled = !consent.checked;
});

function generateSubmissionId() {
  return "SUB-" + Date.now().toString(36).toUpperCase();
}

document.getElementById("uploadForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const file = document.getElementById("file").files[0];
  if (!file) return;

  const submissionId = generateSubmissionId();

  submitBtn.disabled = true;
  status.innerText = "Preparing upload...";
  progressBar.style.display = "block";

  try {

    const setupRes = await fetch("/.netlify/functions/create-upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        submissionId,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        campus: document.getElementById("campus").value,
        programmeStart: document.getElementById("programmeStart").value,
        fileName: file.name,
        fileSize: file.size
      })
    });

    const setupData = await setupRes.json();
    if (!setupRes.ok) throw new Error(setupData.error);

    const { transferId, link, fileId, uploadId, parts } = setupData;

    let bytesUploaded = 0;
    const totalBytes = file.size;

    for (let i = 0; i < parts.length; i++) {

      const part = parts[i];

      const urlRes = await fetch(
        `/.netlify/functions/get-part-url?transferId=${transferId}&fileId=${fileId}&partNumber=${part.partNumber}&uploadId=${encodeURIComponent(uploadId)}`
      );

      const urlData = await urlRes.json();

      const chunk = file.slice(part.start, part.start + part.size);
      const partStart = bytesUploaded;

      await new Promise((resolve, reject) => {

        const xhr = new XMLHttpRequest();
        xhr.open("PUT", urlData.uploadUrl);

        xhr.upload.onprogress = (ev) => {
          const total = partStart + ev.loaded;
          progressBar.value = Math.round((total / totalBytes) * 100);
        };

        xhr.onload = () => {
          bytesUploaded += part.size;
          resolve();
        };

        xhr.onerror = reject;

        xhr.send(chunk);
      });
    }

    await fetch("/.netlify/functions/finalize-upload", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ transferId, fileId, uploadId })
    });

    // ✅ SUCCESS UI
    progressBar.value = 100;

    status.innerText =
      "Upload complete ✔\n" +
      "ID: " + submissionId + "\n" +
      "Link: " + link;

    // -------------------------
    // NETLIFY FORM SUBMISSION
    // -------------------------
    const formData = new FormData();
    formData.append("form-name", "submission");
    formData.append("submissionId", submissionId);
    formData.append("projectName", document.getElementById("projectName").value);
    formData.append("name", document.getElementById("name").value);
    formData.append("email", document.getElementById("email").value);
    formData.append("campus", document.getElementById("campus").value);
    formData.append("programmeStart", document.getElementById("programmeStart").value);
    formData.append("transferLink", link);

    fetch("/", { method: "POST", body: formData })
      .catch(err => console.warn("Netlify form error:", err));

  } catch (err) {
    console.error(err);
    status.innerText = "Error: " + err.message;
    submitBtn.disabled = false;
  }

});

</script>

</body>
</html>
