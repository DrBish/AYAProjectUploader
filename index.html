<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Student Upload Portal</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      padding: 30px;
    }

    .card {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }

    .logo {
      display: block;
      margin: 0 auto 20px auto;
      max-width: 220px;
      height: auto;
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    .terms {
      margin-top: 18px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .terms input {
      width: auto;
      margin-top: 3px;
    }

    .terms label {
      font-weight: normal;
      margin: 0;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
    }

    progress {
      width: 100%;
      margin-top: 20px;
      height: 24px;
    }

    .status {
      margin-top: 15px;
      white-space: pre-line;
      font-size: 14px;
    }

    a {
      color: #0078d4;
    }
  </style>
</head>

<body>

<div class="card">

  <img
    src="./images/eflogogradient.avif"
    class="logo"
    alt="Logo"
  />

  <h2>Student Upload Portal</h2>

  <form id="uploadForm">

    <label>Name</label>
    <input type="text" id="name" required />

    <label>Email</label>
    <input type="email" id="email" required />

    <label>Course / Programme</label>
    <input type="text" id="course" />

    <label>Upload File</label>
    <input type="file" id="file" required />

    <div class="terms">
      <input type="checkbox" id="consent" />
      <label for="consent">
        I have read and accept the
        <a href="./release_agreement.html" target="_blank">
          Terms & Conditions
        </a>
      </label>
    </div>

    <button id="submitBtn" disabled>
      Upload Submission
    </button>

    <progress
      id="progressBar"
      value="0"
      max="100"
      style="display:none;"
    ></progress>

    <div class="status" id="status"></div>

  </form>
</div>

<script>

const consent = document.getElementById("consent");
const submitBtn = document.getElementById("submitBtn");
const progressBar = document.getElementById("progressBar");
const status = document.getElementById("status");

consent.addEventListener("change", () => {
  submitBtn.disabled = !consent.checked;
});

function generateSubmissionId() {
  return "SUB-" + Date.now().toString(36).toUpperCase();
}

document
  .getElementById("uploadForm")
  .addEventListener("submit", async (e) => {

  e.preventDefault();

  const file = document.getElementById("file").files[0];

  if (!file) {
    status.innerText = "Please select a file.";
    return;
  }

  const submissionId = generateSubmissionId();

  status.innerText = "Preparing upload...";

  try {

    // STEP 1 — Ask Netlify Function for upload session
    const setupRes = await fetch(
      "/.netlify/functions/create-upload",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          submissionId,
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          course: document.getElementById("course").value,
          fileName: file.name,
          fileSize: file.size
        })
      }
    );

    const setupData = await setupRes.json();

    if (!setupRes.ok) {
      throw new Error(
        setupData.error || "Upload setup failed"
      );
    }

    // STEP 2 — Upload directly to TransferNow
    progressBar.style.display = "block";

    const xhr = new XMLHttpRequest();

    xhr.open(
      "PUT",
      setupData.uploadUrl
    );

    xhr.upload.addEventListener("progress", (e) => {
      if (e.lengthComputable) {
        const percent =
          Math.round((e.loaded / e.total) * 100);

        progressBar.value = percent;

        status.innerText =
          "Uploading... " + percent + "%";
      }
    });

    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        status.innerText =
          "Upload complete ✔\n\n" +
          "Submission ID: " + submissionId;
      } else {
        status.innerText =
          "Upload failed.";
      }
    };

    xhr.onerror = () => {
      status.innerText =
        "Network error during upload.";
    };

    xhr.send(file);

  } catch (err) {
    console.error(err);
    status.innerText =
      "Error: " + err.message;
  }

});

</script>

</body>
</html>
